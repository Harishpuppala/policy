<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Drone Policy Generator for Academic Institutions</title>

<link rel="stylesheet" href="style.css">

<!-- Tom Select -->
<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<!-- Header Bar -->

<header class="header-bar">

<h1>Drone Policy Generator for Academic Institutions</h1>

<p class="header-subtitle">
Generate UAV operational policies aligned with DGCA Drone Rules and Digital Sky airspace classifications.
</p>

</header>


<div class="container">

<div class="card">

<label>Select Academic Institution</label>

<select id="collegeDropdown" placeholder="Search or select an institution..."></select>

</div>


<div class="card">

<h3>Optional Policy Details</h3>

<label>Drone Operations Oversight Unit</label>
<input type="text" id="department" placeholder="Example: Centre for Drone Technology">

<label>Policy Version</label>
<input type="text" id="policyVersion" placeholder="Example: Version 1.0">

<label>Policy Effective Date</label>
<input type="date" id="policyDate">

</div>


<div class="button-container">
<button onclick="downloadPDF()">Generate Policy PDF</button>
</div>


<p class="footer">
If you have any queries, you may contact
<a href="mailto:harish.p@srmap.edu.in">harish.p@srmap.edu.in</a>
</p>

</div>

<script src="script.js"></script>

</body>

</html>
