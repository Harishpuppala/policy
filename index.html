<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>University Drone Policy Generator</title>

<link rel="stylesheet" href="style.css">

<!-- Tom Select -->
<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<h1>University Drone Policy Generator</h1>

<p class="subtitle">
Generate UAV operational policies aligned with DGCA Drone Rules
and Digital Sky airspace classifications.
</p>

<div class="card">

<label>Select University</label>

<select id="collegeDropdown" placeholder="Search or select a university..."></select>

</div>


<div class="card">

<h3>Optional Policy Details</h3>

<label>Department / Responsible Unit</label>
<input type="text" id="department" placeholder="Example: Centre for Drone Technology">

<label>Policy Version</label>
<input type="text" id="policyVersion" placeholder="Example: Version 1.0">

<label>Policy Effective Date</label>
<input type="date" id="policyDate">

</div>

<div class="button-container">
<button onclick="downloadPDF()">Generate Policy PDF</button>
</div>

</div>

<script src="script.js"></script>

</body>

</html>
